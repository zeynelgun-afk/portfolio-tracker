name: Portfolio Report → Twitter Thread Generator

on:
  # Rapor dosyası push'lendiğinde trigger
  push:
    paths:
      - 'reports/**/*.md'
      - 'data/portfolios/*.json'
      - 'DAILY_*.md'
    branches:
      - main

jobs:
  publish-thread:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Repo'yu klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Python kurulum
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Dependencies yükle
        run: |
          pip install requests
      
      - name: CPU thread oluştur
        run: |
          python3 scripts/generate_cpu_thread.py \
            --output data/twitter_threads/cpu_thread.json
      
      - name: Thread'i preview göster
        run: |
          python3 -c "
          import json
          with open('data/twitter_threads/cpu_thread.json') as f:
              data = json.load(f)
          print('=' * 60)
          print('OLUŞTURULAN THREAD PREVIEW')
          print('=' * 60)
          for i, tweet in enumerate(data['threads'], 1):
              print(f'[{i}/{len(data[\"threads\"])}] ({len(tweet)} char)')
              print('-' * 60)
              print(tweet)
              print()
          "
      
      - name: Git'e thread'i commit et
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Finzora AI Bot"
          
          git add data/twitter_threads/
          
          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit yapılmıyor"
          else
            git commit -m "ci: twitter thread oluşturuldu (cpu arz darbogazi) - $(date -u +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
      
      - name: Telegram'a thread hazır bildirimi
        if: success()
        run: |
          python3 - <<'EOF'
          import requests
          import os
          import json
          
          telegram_token = os.getenv("TELEGRAM_BOT_TOKEN")
          telegram_chat = os.getenv("TELEGRAM_CHAT_ID")
          
          if not (telegram_token and telegram_chat):
              print("⚠️ Telegram credentials eksik, atlaniyor")
              exit(0)
          
          # Thread'i oku
          with open('data/twitter_threads/cpu_thread.json') as f:
              data = json.load(f)
          
          message = f"""
          ✅ CPU Arz Darbogazi Twitter thread'i oluşturuldu!
          
          📊 {len(data['threads'])} tweet hazır
          🔗 Repo: data/twitter_threads/cpu_thread.json
          
          ▶️ Paylaşmak için: python3 scripts/twitter_thread_poster.py --source data/twitter_threads/cpu_thread.json
          
          #Finzora #PortfolioManagement
          """
          
          url = f"https://api.telegram.org/bot{telegram_token}/sendMessage"
          data_req = {
              "chat_id": telegram_chat,
              "text": message,
              "parse_mode": "HTML"
          }
          
          response = requests.post(url, json=data_req)
          if response.status_code == 200:
              print("✓ Telegram bildirimi gönderildi")
          else:
              print(f"⚠️ Telegram hatası: {response.status_code}")
          EOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

