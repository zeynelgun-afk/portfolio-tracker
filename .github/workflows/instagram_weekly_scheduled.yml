name: "Instagram: Haftalık Özet (5 Nis 20:30 TR)"

on:
  schedule:
    - cron: '30 17 5 4 *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python3 scripts/publish_carousel.py --type weekly
