name: Sabah Evren Taraması

"on":
  schedule:
    - cron: '15 6 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'balanced/dividend/aggressive/all'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Bagimliliklar
        run: pip install requests

      - name: Git config
        run: |
          git config user.name "Finzora AI"
          git config user.email "zeynelgun@users.noreply.github.com"

      - name: Taramayi calistir
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="all"; fi
          echo "Mod: $MODE"
          python3 scripts/full_universe_screener.py --mode "$MODE" --workers 8
        env:
          PYTHONUNBUFFERED: '1'

      - name: Ozet
        run: python3 scripts/scan_summary.py || echo "Ozet alinamadi"

      - name: Commit
        run: |
          git pull --rebase origin main || true
          git add data/daily_scan_*.json data/daily_full_scan.json || true
          git diff --staged --quiet || git commit -m "[AUTO-SCAN] $(date +'%Y-%m-%d %H:%M UTC')"
          git push || (sleep 10 && git pull --rebase && git push) || true

  swing-entry-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: morning-scan
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4

      - name: Git config
        run: |
          git config user.name "Finzora AI"
          git config user.email "zeynelgun@users.noreply.github.com"

      - name: Swing Entry Scan
        run: |
          git pull --rebase origin main || true
          python scripts/swing_entry_engine.py --watchlist 2>&1 | tee /tmp/swing_entry.txt

      - name: Sonuç kaydet
        run: |
          python3 -c "
import json, subprocess
from datetime import datetime
result = open('/tmp/swing_entry.txt').read()
# JSON'a kaydet
data = {
    'tarih': datetime.now().isoformat(),
    'ham_cikti': result,
    'giris_sinyalleri': []
}
# Parse et
for line in result.split('\n'):
    if 'GİRİŞ ✅' in line:
        parts = line.strip().split()
        if parts:
            data['giris_sinyalleri'].append(parts[0])
with open('data/swing_entry_signals.json', 'w') as f:
    json.dump(data, f, ensure_ascii=False, indent=2)
print('Tespit edilen sinyaller:', data['giris_sinyalleri'])
"
          git add data/swing_entry_signals.json
          git commit -m "[AUTO] Swing entry sinyalleri $(date +%Y-%m-%d)" || true
          git push || true
