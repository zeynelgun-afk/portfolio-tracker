name: Sabah Evren Taraması

"on":
  schedule:
    - cron: '15 6 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'balanced/dividend/aggressive/all'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Bagimliliklar
        run: pip install requests

      - name: Git config
        run: |
          git config user.name "Finzora AI"
          git config user.email "zeynelgun@users.noreply.github.com"

      - name: Taramayi calistir
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="all"; fi
          echo "Mod: $MODE"
          python3 scripts/full_universe_screener.py --mode "$MODE" --workers 8
        env:
          PYTHONUNBUFFERED: '1'

      - name: Ozet
        run: python3 scripts/scan_summary.py || echo "Ozet alinamadi"

      - name: Commit
        run: |
          git pull --rebase origin main || true
          git add data/daily_scan_*.json data/daily_full_scan.json || true
          git diff --staged --quiet || git commit -m "[AUTO-SCAN] $(date +'%Y-%m-%d %H:%M UTC')"
          git push || (sleep 10 && git pull --rebase && git push) || true
