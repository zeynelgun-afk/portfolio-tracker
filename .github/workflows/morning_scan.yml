name: Sabah Evren Taraması

on:
  schedule:
    # 06:15 UTC = 09:15 TR — saatin tam başı değil (yük önleme)
    - cron: '15 6 * * 1-5'
  workflow_dispatch:
    inputs:
      min_mcap:
        description: 'Min market cap (USD, default 200M)'
        required: false
        default: '200000000'
      max_peg:
        description: 'Max PEG ratio'
        required: false
        default: '2.5'
      sector:
        description: 'Sektör filtresi (boş = hepsi)'
        required: false
        default: ''

# GITHUB_TOKEN'a push yetkisi ver
permissions:
  contents: write

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Git config
        run: |
          git config user.name "Finzora AI"
          git config user.email "zeynelgun@users.noreply.github.com"

      - name: Taramayı çalıştır
        run: |
          MIN_MCAP="${{ github.event.inputs.min_mcap || '200000000' }}"
          MAX_PEG="${{ github.event.inputs.max_peg || '2.5' }}"
          SECTOR="${{ github.event.inputs.sector || '' }}"

          if [ -n "$SECTOR" ]; then
            python3 scripts/full_universe_screener.py \
              --min-mcap "$MIN_MCAP" \
              --max-peg "$MAX_PEG" \
              --sector "$SECTOR" \
              --workers 8
          else
            python3 scripts/full_universe_screener.py \
              --min-mcap "$MIN_MCAP" \
              --max-peg "$MAX_PEG" \
              --workers 8
          fi
        env:
          PYTHONUNBUFFERED: 1

      - name: Sonuçları commit et
        run: |
          if [[ -n $(git status --porcelain data/daily_full_scan.json) ]]; then
            echo "Değişiklik tespit edildi, commit yapılıyor..."
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              git add data/daily_full_scan.json
              git diff --staged --quiet && echo "Commit edilecek değişiklik yok" && exit 0
              git commit -m "[AUTO-SCAN] Sabah taraması $(date +'%Y-%m-%d %H:%M UTC') | $(python3 -c \"import json; d=json.load(open('data/daily_full_scan.json')); print(f\\\"{d['toplam_taranan']} hisse tarandı, {d['peg_filtreli']} aday\\\")\")"
              git push && echo "✅ Push başarılı" && exit 0
              sleep $((attempt * 5))
            done
            echo "❌ Push başarısız" && exit 1
          else
            echo "Değişiklik yok, commit atlanıyor."
          fi
