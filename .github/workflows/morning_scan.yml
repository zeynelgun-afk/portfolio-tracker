name: Sabah Evren Taraması

on:
  schedule:
    - cron: '15 6 * * 1-5'
  workflow_dispatch:
    inputs:
      min_mcap:
        description: 'Min market cap (USD, default 200M)'
        required: false
        default: '200000000'
      max_peg:
        description: 'Max PEG ratio'
        required: false
        default: '2.5'
      sector:
        description: 'Sektor filtresi (bos = hepsi)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Git config
        run: |
          git config user.name "Finzora AI"
          git config user.email "zeynelgun@users.noreply.github.com"

      - name: Taramayi calistir
        run: |
          MIN_MCAP="${{ github.event.inputs.min_mcap || '200000000' }}"
          MAX_PEG="${{ github.event.inputs.max_peg || '2.5' }}"
          SECTOR="${{ github.event.inputs.sector || '' }}"

          if [ -n "$SECTOR" ]; then
            python3 scripts/full_universe_screener.py \
              --min-mcap "$MIN_MCAP" \
              --max-peg "$MAX_PEG" \
              --sector "$SECTOR" \
              --workers 8
          else
            python3 scripts/full_universe_screener.py \
              --min-mcap "$MIN_MCAP" \
              --max-peg "$MAX_PEG" \
              --workers 8
          fi
        env:
          PYTHONUNBUFFERED: 1

      - name: Scan ozeti olustur
        id: scan_summary
        run: |
          python3 -c "
import json, sys
try:
    d = json.load(open('data/daily_full_scan.json'))
    tarandi = d.get('toplam_taranan', '?')
    aday = d.get('peg_filtreli', '?')
    print(f'{tarandi} hisse tarandi, {aday} aday')
except Exception:
    print('tarama tamamlandi')
" > /tmp/scan_info.txt 2>/dev/null || echo 'tarama tamamlandi' > /tmp/scan_info.txt
          echo "info=$(cat /tmp/scan_info.txt)" >> "$GITHUB_OUTPUT"

      - name: Sonuclari commit et
        run: |
          if [[ -n $(git status --porcelain data/daily_full_scan.json) ]]; then
            echo "Degisiklik tespit edildi, commit yapiliyor..."
            TARIH=$(date +'%Y-%m-%d %H:%M UTC')
            SCAN_INFO="${{ steps.scan_summary.outputs.info }}"
            COMMIT_MSG="[AUTO-SCAN] Sabah taramasi ${TARIH} | ${SCAN_INFO}"
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              git add data/daily_full_scan.json
              git diff --staged --quiet && echo "Commit edilecek degisiklik yok" && exit 0
              git commit -m "$COMMIT_MSG"
              git push && echo "Push basarili" && exit 0
              sleep $((attempt * 5))
            done
            echo "Push basarisiz" && exit 1
          else
            echo "Degisiklik yok, commit atlaniyor."
          fi
