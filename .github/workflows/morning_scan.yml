name: Sabah Evren Taramasi

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/morning_scan.yml'
      - 'scripts/full_universe_screener.py'

    inputs:
      mode:
        description: 'balanced/dividend/aggressive/all'
        required: false
        default: 'all'
  push:
    paths:
      - '.github/workflows/morning_scan.yml'
      - 'scripts/full_universe_screener.py'
      - 'scripts/scan_summary.py'
      - 'scripts/swing_entry_engine.py'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Event kontrol
        run: |
          echo "Event: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Push event - workflow syntax gecerli, tarama schedule calisacak"
          else
            echo "${{ github.event_name }} - morning-scan baslatiliyor"
          fi

  morning-scan:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Bagimliliklar
        run: pip install requests

      - name: Git config
        run: |
          git config user.name "Finzora AI"
          git config user.email "zeynelgun@users.noreply.github.com"

      - name: Taramayi calistir
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="all"; fi
          echo "Mod: $MODE"
          python3 scripts/full_universe_screener.py --mode "$MODE" --workers 8
        env:
          PYTHONUNBUFFERED: '1'

      - name: Ozet
        run: python3 scripts/scan_summary.py || echo "Ozet alinamadi"

      - name: Sonuclari kaydet
        run: |
          cp data/daily_scan_balanced.json   /tmp/scan_balanced.json   2>/dev/null || true
          cp data/daily_scan_dividend.json   /tmp/scan_dividend.json   2>/dev/null || true
          cp data/daily_scan_aggressive.json /tmp/scan_aggressive.json 2>/dev/null || true
          cp data/daily_full_scan.json       /tmp/scan_full.json       2>/dev/null || true
          cp logs/valuation_predictions.jsonl /tmp/scan_vpred.jsonl    2>/dev/null || true
          git fetch origin main
          git rebase --abort 2>/dev/null || true
          git merge --abort  2>/dev/null || true
          git reset --hard origin/main
          cp /tmp/scan_balanced.json   data/daily_scan_balanced.json   2>/dev/null || true
          cp /tmp/scan_dividend.json   data/daily_scan_dividend.json   2>/dev/null || true
          cp /tmp/scan_aggressive.json data/daily_scan_aggressive.json 2>/dev/null || true
          cp /tmp/scan_full.json       data/daily_full_scan.json       2>/dev/null || true
          # Valuation predictions append-merge (timestamp'li satirlar, sort -u dedup eder)
          if [ -f /tmp/scan_vpred.jsonl ] && [ -f logs/valuation_predictions.jsonl ]; then
            cat logs/valuation_predictions.jsonl /tmp/scan_vpred.jsonl | sort -u > logs/valuation_predictions.jsonl.new
            mv logs/valuation_predictions.jsonl.new logs/valuation_predictions.jsonl
          elif [ -f /tmp/scan_vpred.jsonl ]; then
            cp /tmp/scan_vpred.jsonl logs/valuation_predictions.jsonl
          fi
          git add data/daily_scan_*.json data/daily_full_scan.json logs/valuation_predictions.jsonl 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Degisiklik yok - commit atlaniyor"
          else
            git commit -m "[AUTO-SCAN] $(date +'%Y-%m-%d %H:%M UTC')"
            git push origin main || (sleep 15 && git fetch origin main && git reset --hard origin/main && cp /tmp/scan_*.json data/ 2>/dev/null; cp /tmp/scan_vpred.jsonl logs/valuation_predictions.jsonl 2>/dev/null; git add data/daily_scan_*.json data/daily_full_scan.json logs/valuation_predictions.jsonl && git commit -m "[AUTO-SCAN-RETRY] $(date +'%Y-%m-%d %H:%M UTC')" && git push origin main)
          fi

  swing-entry-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: morning-scan
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4

      - name: Git config
        run: |
          git config user.name "Finzora AI"
          git config user.email "zeynelgun@users.noreply.github.com"

      - name: Swing Entry Scan
        run: |
          git fetch origin main
          git rebase --abort 2>/dev/null || true
          git reset --hard origin/main
          python scripts/swing_entry_engine.py --watchlist 2>&1 | tee /tmp/swing_entry.txt

      - name: Sonuc kaydet
        run: |
          python3 scripts/parse_swing_entry.py /tmp/swing_entry.txt data/swing_entry_signals.json
          cp data/swing_entry_signals.json /tmp/swing_signals_bak.json 2>/dev/null || true
          git fetch origin main
          git rebase --abort 2>/dev/null || true
          git merge --abort  2>/dev/null || true
          git reset --hard origin/main
          cp /tmp/swing_signals_bak.json data/swing_entry_signals.json 2>/dev/null || true
          git add data/swing_entry_signals.json
          if git diff --staged --quiet; then
            echo "Degisiklik yok"
          else
            git commit -m "[AUTO] Swing entry sinyalleri $(date +%Y-%m-%d)"
            git push origin main || (sleep 10 && git pull origin main && git push origin main) || true
          fi

      - name: Hata bildirimi
        if: failure()
        run: |
          pip install requests -q
          python scripts/event_logger.py \
            --seviye kritik \
            --baslik "Workflow basarisiz: morning_scan" \
            --detay "GitHub Actions hatasi. Commit: ${{ github.sha }}" \
            --kaynak "github_actions"
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_ID: "1403072107"
