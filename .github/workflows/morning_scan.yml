name: Sabah Evren Taraması

on:
  schedule:
    - cron: '15 6 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Tarama modu'
        required: false
        default: 'all'
        type: choice
        options: [all, balanced, dividend, aggressive]

permissions:
  contents: write

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Git config
        run: |
          git config user.name "Finzora AI"
          git config user.email "zeynelgun@users.noreply.github.com"

      - name: Taramayi calistir
        run: |
          MODE="${{ github.event.inputs.mode || 'all' }}"
          python3 scripts/full_universe_screener.py --mode "$MODE" --workers 12
        env:
          PYTHONUNBUFFERED: 1

      - name: Ozet olustur
        id: ozet
        run: |
          python3 -c "
import json, os
lines = []
for mode in ['balanced','dividend','aggressive']:
    fname = f'data/daily_scan_{mode}.json'
    if os.path.exists(fname):
        d = json.load(open(fname))
        lines.append(f\"{mode}:{d.get('ekle_adaylari','?')}ekle/{d.get('izle_adaylari','?')}izle\")
print(' | '.join(lines))
" > /tmp/ozet.txt 2>/dev/null || echo 'tarama tamamlandi' > /tmp/ozet.txt
          echo "info=$(cat /tmp/ozet.txt)" >> "$GITHUB_OUTPUT"

      - name: Sonuclari commit et
        run: |
          FILES="data/daily_scan_balanced.json data/daily_scan_dividend.json data/daily_scan_aggressive.json data/daily_full_scan.json"
          CHANGED=$(git status --porcelain $FILES)
          if [[ -n "$CHANGED" ]]; then
            echo "Degisiklik tespit edildi..."
            TARIH=$(date +'%Y-%m-%d %H:%M UTC')
            INFO="${{ steps.ozet.outputs.info }}"
            COMMIT_MSG="[AUTO-SCAN] ${TARIH} | ${INFO}"
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              git add $FILES
              git diff --staged --quiet && echo "Commit edilecek degisiklik yok" && exit 0
              git commit -m "$COMMIT_MSG"
              git push && echo "Push basarili" && exit 0
              sleep $((attempt * 5))
            done
            echo "Push basarisiz" && exit 1
          else
            echo "Degisiklik yok."
          fi
