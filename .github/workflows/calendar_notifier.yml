name: 📅 Takvim Bildirimi

on:
  schedule:
    # Her gün 05:30 UTC = 08:30 Türkiye saati
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      test_modu:
        description: 'Test modu (yarın yerine bugünü göster)'
        required: false
        default: 'false'
        type: boolean

jobs:
  takvim-bildirimi:
    name: Yarınki Etkinlikleri Bildir
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Repo İndir
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Bağımlılıkları Yükle
        run: pip install --quiet requests icalendar pytz

      - name: 📅 Takvim Bildirimi Gönder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
          GCAL_ICAL_URLS:  ${{ secrets.GCAL_ICAL_URLS }}
          GCAL_ICAL_NAMES: ${{ secrets.GCAL_ICAL_NAMES }}
        # Shell if ile kontrol — GitHub Actions boolean karşılaştırması güvenilmez
        run: |
          if [[ "${{ inputs.test_modu }}" == "true" ]]; then
            echo "TEST MODU: Bugünkü etkinlikler gösterilecek"
            python scripts/calendar_notifier.py --test
          else
            echo "NORMAL MOD: Yarınki etkinlikler gösterilecek"
            python scripts/calendar_notifier.py
          fi
