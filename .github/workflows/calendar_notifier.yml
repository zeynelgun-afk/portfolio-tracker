name: 📅 Takvim Bildirimi (Manuel)

on:
  # Schedule kaldırıldı — Railway bot 08:30 TR'de gönderir
  # Sadece test/acil için manuel tetikleme bırakıldı
  workflow_dispatch:
    inputs:
      test_modu:
        description: 'Test modu (yarın yerine bugünü göster)'
        required: false
        default: 'false'
        type: boolean

jobs:
  takvim-bildirimi:
    name: Yarınki Etkinlikleri Bildir
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Repo İndir
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Bağımlılıkları Yükle
        run: pip install --quiet requests icalendar recurring-ical-events pytz

      - name: 📅 Takvim Bildirimi Gönder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
          GCAL_ICAL_URLS:  ${{ secrets.GCAL_ICAL_URLS }}
          GCAL_ICAL_NAMES: ${{ secrets.GCAL_ICAL_NAMES }}
        run: |
          if [[ "${{ inputs.test_modu }}" == "true" ]]; then
            python scripts/calendar_notifier.py --test
          else
            python scripts/calendar_notifier.py
          fi
