name: Adil Değer Paneli

on:
  workflow_dispatch:

jobs:
  panel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Bağımlılıklar
        run: pip install requests python-dateutil
      - name: Çalıştır
        run: python3 scripts/portfoy_adil_deger.py --rapor --telegram
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
      - name: Commit
        run: |
          git config user.name "Finzora Bot"
          git config user.email "finzora-bot@users.noreply.github.com"
          git add reports/ || true
          git diff --staged --quiet || git commit -m "[bot/panel] Adil Değer Paneli $(date +%Y-%m-%d)"
          git push || true
