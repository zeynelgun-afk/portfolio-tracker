name: Swing Trade Scanner

on:
  schedule:
    # Weekdays: Scan at 11:30 UTC (14:30 TRT, right after US market open stabilizes)
    - cron: '30 11 * * 1-5'
    # Weekdays: Track at 21:00 UTC (00:00 TRT, after market close)
    - cron: '0 21 * * 1-5'
    # Sunday: Weekly autopsy
    - cron: '0 10 * * 0'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'scan'
        type: choice
        options:
          - scan
          - track
          - autopsy

permissions:
  contents: write

jobs:
  swing-trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 11 * * 1-5" ]; then
            echo "action=scan" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 21 * * 1-5" ]; then
            echo "action=track" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 10 * * 0" ]; then
            echo "action=autopsy" >> $GITHUB_OUTPUT
          fi
      
      - name: Run Scanner
        if: steps.action.outputs.action == 'scan'
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          cd swing-trade/scripts
          python3 scanner.py --api-key $FMP_API_KEY --max-signals 5
      
      - name: Run Tracker
        if: steps.action.outputs.action == 'track'
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          cd swing-trade/scripts
          python3 signal_tracker.py --api-key $FMP_API_KEY
      
      - name: Run Autopsy
        if: steps.action.outputs.action == 'autopsy'
        run: |
          cd swing-trade/scripts
          python3 autopsy.py --apply --report
      
      - name: Commit results
        run: |
          git config user.name "Swing Trade Bot"
          git config user.email "bot@swing-trade.local"
          git add -A
          CHANGES=$(git diff --cached --stat)
          if [ -n "$CHANGES" ]; then
            ACTION="${{ steps.action.outputs.action }}"
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "🤖 swing-trade: ${ACTION} ${DATE}"
            git push
          else
            echo "No changes to commit"
          fi
