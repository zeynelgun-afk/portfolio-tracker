name: Swing Trade Scanner

on:
  schedule:
    - cron: '30 11 * * 1-5'  # Scan: 14:30 TRT
    - cron: '0 21 * * 1-5'   # Track: 00:00 TRT
    - cron: '0 10 * * 0'     # Autopsy: Sunday
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'scan'
        type: choice
        options:
          - scan
          - track
          - autopsy
          - optimize

permissions:
  contents: write

jobs:
  swing-trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests yfinance pandas numpy
      
      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 11 * * 1-5" ]; then
            echo "action=scan" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 21 * * 1-5" ]; then
            echo "action=track" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 10 * * 0" ]; then
            echo "action=autopsy" >> $GITHUB_OUTPUT
          fi
      
      - name: Run Scanner
        if: steps.action.outputs.action == 'scan'
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python3 swing-trade/scripts/scanner.py --api-key $FMP_API_KEY

      - name: Run Tracker
        if: steps.action.outputs.action == 'track'
        run: python3 swing-trade/scripts/signal_tracker.py

      - name: Run Autopsy
        if: steps.action.outputs.action == 'autopsy'
        run: python3 swing-trade/scripts/autopsy.py --apply --report

      - name: Run Optimizer
        if: steps.action.outputs.action == 'optimize'
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python3 swing-trade/scripts/optimizer.py --api-key $FMP_API_KEY --passes 5

      - name: Commit results
        run: |
          git config user.name "Swing Trade Bot"
          git config user.email "bot@swing-trade.local"
          git add -A
          CHANGES=$(git diff --cached --stat)
          if [ -n "$CHANGES" ]; then
            ACTION="${{ steps.action.outputs.action }}"
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "🤖 swing-trade: ${ACTION} ${DATE}"
            git push
          fi
