name: Momentum Scanner

on:
  schedule:
    - cron: '30 11 * * 5'    # Cuma 14:30 TRT — haftalık scan + rebalance
    - cron: '0 21 * * 1-5'   # Hafta içi 00:00 TRT — fiyat takibi
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'scan'
        type: choice
        options:
          - scan
          - track
          - backtest

permissions:
  contents: write

jobs:
  momentum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests yfinance pandas numpy
      
      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" = "5" ] && [ "${{ github.event.schedule }}" = "30 11 * * 5" ]; then
            echo "action=scan" >> $GITHUB_OUTPUT
          else
            echo "action=track" >> $GITHUB_OUTPUT
          fi
      
      - name: Run Momentum Scanner
        if: steps.action.outputs.action == 'scan'
        working-directory: swing-trade/scripts
        run: python3 momentum_scanner.py
      
      - name: Run Tracker
        if: steps.action.outputs.action == 'track'
        working-directory: swing-trade/scripts
        run: python3 momentum_tracker.py
      
      - name: Run Backtest
        if: steps.action.outputs.action == 'backtest'
        working-directory: swing-trade/scripts
        run: python3 momentum_strategy.py --start 2024-01-02 --top 5 --rebal 5 --no-regime --no-risk-adjust
      
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
          else
            ACTION="${{ steps.action.outputs.action }}"
            DATE=$(date +%Y-%m-%d)
            git commit -m "🚀 momentum: ${ACTION} ${DATE}"
            git push
          fi
