name: 📅 Günlük Rapor (Otomatik)

on:
  schedule:
    - cron: '0 11 * * *'  # Her gün 11:00 UTC = 14:00 TR (Türkiye: UTC+3)
  workflow_dispatch:  # Manuel tetikleme de mümkün

jobs:
  create-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests python-dateutil pytz
      
      - name: Create Daily Report
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python scripts/generate_daily_report.py
      
      - name: Commit and Push
        run: |
          git config user.name "Portfolio Bot"
          git config user.email "bot@portfolio-tracker.com"
          git add reports/daily/
          git commit -m "📊 Otomatik Günlük Rapor - $(date +'%d %B %Y')" || echo "No changes"
          git push

