name: 📊 Günlük Rapor (Manuel)

on:
  workflow_dispatch:  # Manuel tetikleme butonu
    inputs:
      date:
        description: 'Rapor tarihi (YYYY-MM-DD)'
        required: false
        default: 'today'

jobs:
  create-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests python-dateutil
      
      - name: Create Daily Report
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python scripts/generate_daily_report.py
      
      - name: Commit and Push
        run: |
          git config user.name "Portfolio Bot"
          git config user.email "bot@portfolio-tracker.com"
          git add reports/daily/
          git commit -m "📊 Günlük Rapor - $(date +'%d %B %Y')" || echo "No changes"
          git push

