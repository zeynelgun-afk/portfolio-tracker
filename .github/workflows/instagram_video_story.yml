name: Instagram Video Story Yayınla

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video URL (catbox.moe)'
        required: true
        default: 'https://files.catbox.moe/deljsw.mp4'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python3 scripts/publish_video_story.py "${{ github.event.inputs.video_url }}"
