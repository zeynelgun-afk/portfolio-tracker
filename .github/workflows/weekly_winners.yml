name: Haftalık Kazananlar Vitrini

on:
  schedule:
    # Her pazar 17:00 UTC = 20:00 TR
    - cron: '0 17 * * 0'

  # Manuel tetikleme
  workflow_dispatch:
    inputs:
      theme:
        description: 'Vitrin teması (opsiyonel)'
        required: false
        default: ''

jobs:
  winners-telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Bağımlılıkları yükle
        run: pip install requests

      - name: Kazananlar vitrinini gönder
        run: |
          THEME="${{ github.event.inputs.theme }}"
          if [ -z "$THEME" ]; then
            python3 scripts/telegram_notify.py --type winners
          else
            python3 scripts/telegram_notify.py --type winners --theme "$THEME"
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
