name: "Instagram: $100 Yatırım Rehberi (6 Nis 20:35 TR)"

on:
  schedule:
    - cron: '35 17 6 4 *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python3 scripts/publish_carousel.py --type 100dollar
