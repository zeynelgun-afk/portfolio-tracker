name: "Instagram: 7 Hata Carousel (20:30 TR)"

on:
  schedule:
    - cron: '30 17 4 4 *'  # 4 Nisan 2026, 17:30 UTC = 20:30 TR
  workflow_dispatch:  # manuel tetikleme de mümkün

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Publish 7 Mistakes Carousel
        run: python3 scripts/publish_7mistakes.py
