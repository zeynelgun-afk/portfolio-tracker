name: Haber Radarı

on:
  workflow_dispatch:          # manuel test için

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıklar
        run: pip install requests 'openai>=1.40.0'

      - name: Haber Radarı çalıştır
        # Faz 2 Adım 7 (17 May 2026): scripts/news_radar.py → agent/scanners/news.py
        run: python3 agent/scanners/news.py
        env:
          FMP_API_KEY:          ${{ secrets.FMP_API_KEY }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_ID:  ${{ secrets.TELEGRAM_PRIVATE_ID }}
          # Faz 2: agent.scanners.* importları için
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/agent:${{ github.workspace }}/agent/legacy

      - name: Log commit et
        run: |
          git config user.name  "Finzora Bot"
          git config user.email "finzora-bot@users.noreply.github.com"
          git add data/news_radar_log.json || true
          git diff --staged --quiet || git commit -m "[bot/radar] Haber radarı log güncellendi $(date +'%Y-%m-%d %H:%M')"
          git push || true
