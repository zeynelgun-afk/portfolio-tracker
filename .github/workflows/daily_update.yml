name: Daily Portfolio Update

on:
  schedule:
    # Her iş günü US market kapanışından sonra (EST 16:30 = UTC 21:30)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # Manuel tetikleme

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install requests

    - name: Run portfolio update
      env:
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      run: |
        python3 scripts/update_portfolio.py \
          --api-key "$FMP_API_KEY" \
          --report \
          --save-report

    - name: Commit and push updates
      run: |
        git config user.name "Portfolio Bot"
        git config user.email "bot@portfolio-tracker.local"
        git add data/ reports/
        
        # Sadece değişiklik varsa commit yap
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          DATE=$(date +%Y-%m-%d)
          git commit -m "📊 Daily update: ${DATE}"
          git push
        fi
