name: Otomatik Fiyat Güncelleme (Seans Saatleri)

on:
  # Seans saatlerinde her 30 dakikada bir çalış
  schedule:
    # NYSE seans: TR 17:30-00:00 = UTC 14:30-21:00
    # Her 30 dakikada bir: 14:30, 15:00, 15:30... 21:00
    - cron: '30,0 14-20 * * 1-5'  # Pazartesi-Cuma
    - cron: '0 21 * * 1-5'        # Kapanış (21:00 UTC = 00:00 TR)
  
  # Manuel tetikleme (GitHub UI'dan)
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Tam geçmiş
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests
      
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Portfolio Bot"
      
      - name: Run update script
        run: |
          python3 scripts/daily_update.py
        env:
          PYTHONUNBUFFERED: 1
      
      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Pull latest changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git pull --rebase origin main
      
      - name: Commit and push changes (with retry)
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            git add -A
            git commit -m "[AUTO] Fiyat güncellemesi - $(date +'%d %b %Y %H:%M UTC')" || true
            git pull --rebase origin main
            git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
