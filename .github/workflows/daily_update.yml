name: Otomatik Fiyat ve Stop Güncellemesi

on:
  schedule:
    # NYSE kapanışı: 23:05 UTC+3 (TR) = 20:05 UTC — kapanış fiyatları oturdu
    - cron: '5 20 * * 1-5'
  workflow_dispatch:  # Manuel tetikleme aktif

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Tam geçmiş
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests
      
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Portfolio Bot"
      
      - name: Run update script
        run: |
          python3 scripts/daily_update.py
        env:
          PYTHONUNBUFFERED: 1
      
      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes (with retry)
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # 3 deneme ile commit ve push
          for i in 1 2 3; do
            echo "Attempt $i/3..."
            
            # Önce pull yap (conflict önleme)
            git pull --rebase origin main || true
            
            # Commit yap
            git add -A
            git commit -m "[AUTO] Fiyat güncellemesi - $(date +'%d %b %Y %H:%M UTC')" || true
            
            # Push dene
            if git push; then
              echo "✅ Push başarılı!"
              exit 0
            else
              echo "⚠️ Push başarısız, tekrar deneniyor..."
              sleep 5
            fi
          done
          
          echo "❌ 3 denemede push başarısız oldu!"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Hata bildirimi
        if: failure()
        run: |
          pip install requests -q
          python scripts/event_logger.py \
            --seviye kritik \
            --baslik "Workflow başarısız: daily_update" \
            --detay "GitHub Actions hatası. Commit: ${{ github.sha }}" \
            --kaynak "github_actions"
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_CHAT }}
