name: Adil Değer Taraması (Manuel)

on:
  workflow_dispatch:   # Sadece elle tetiklenir, otomatik schedule yok

jobs:
  adil-deger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Tarama
        run: |
          python3 scripts/adil_deger_calculator.py \
            --portfolio balanced \
            --report --telegram
      - name: Git commit
        run: |
          git config user.name "Finzora AI"
          git config user.email "zeynelgun@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "auto: adil değer raporu $(date +%Y-%m-%d)"
          git push
