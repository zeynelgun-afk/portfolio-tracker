name: Adil Değer Taraması (Manuel)

on:
  workflow_dispatch:   # Sadece elle tetiklenir, otomatik schedule yok

jobs:
  adil-deger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Tarama
        run: |
          python3 scripts/adil_deger_calculator.py \
            --portfolio balanced \
            --report --telegram
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
      - name: Git commit
        run: |
          git config user.name "Finzora Bot"
          git config user.email "finzora-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "[bot/panel-weekly] Adil değer raporu $(date +%Y-%m-%d)"
          git push
