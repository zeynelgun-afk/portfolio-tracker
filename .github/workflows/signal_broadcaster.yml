name: Signal Broadcaster
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no Telegram, just print)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

concurrency:
  group: finzora-signal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run signal broadcaster
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_CHAT_ID: '-1003827034395'
          TELEGRAM_DM_CHAT_ID: '1403072107'
        run: |
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          if [ "$DRY" = "true" ]; then
            python scripts/signal_broadcaster.py --dry-run
          else
            python scripts/signal_broadcaster.py --telegram
          fi

      - name: Commit event log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/events.jsonl
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[signal] event log update"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "Push retry $i..."
              sleep 2
            done
          fi
