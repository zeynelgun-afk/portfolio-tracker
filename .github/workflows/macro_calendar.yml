name: 📈 Makro Takvim Güncelle

on:
  schedule:
    # Her ayın 1'i, 06:00 UTC = 09:00 TR
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      ay:
        description: 'Belirli ay (YYYY-MM, boş = otomatik)'
        required: false
        default: ''
      aylar:
        description: 'Kaç ay kapsansın (varsayılan: 2)'
        required: false
        default: '2'
      test_modu:
        description: 'Test modu (ICS yazma, sadece önizle)'
        required: false
        default: 'false'
        type: boolean

jobs:
  makro-takvim:
    name: Makro Takvimi Güncelle
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Repo İndir
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Bağımlılıkları Yükle
        run: pip install --quiet requests icalendar python-dateutil pytz

      - name: 📅 Takvim Güncelle + Commit + Bildirim
        env:
          FMP_API_KEY:         ${{ secrets.FMP_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
        run: |
          TEST_MODU="${{ inputs.test_modu }}"
          AYLAR="${{ inputs.aylar || '2' }}"
          AY_ARG=""
          if [ -n "${{ inputs.ay }}" ]; then
            AY_ARG="--ay ${{ inputs.ay }}"
          fi

          if [[ "$TEST_MODU" == "true" ]]; then
            echo "=== TEST MODU — ICS yazılmayacak ==="
            python scripts/macro_calendar_updater.py $AY_ARG --aylar "$AYLAR" --test
            echo "=== Test tamamlandı — commit yok ==="
          else
            echo "=== NORMAL MOD ==="
            python scripts/macro_calendar_updater.py $AY_ARG --aylar "$AYLAR"

            git config user.name  "Finzora AI"
            git config user.email "zeynelgun@users.noreply.github.com"
            git add data/calendars/macro_events.ics
            if git diff --staged --quiet; then
              echo "Değişiklik yok — commit atlanıyor."
            else
              TARIH=$(date +'%Y-%m')
              git commit -m "[DATA] Makro takvim güncellendi — $TARIH"
              git push
              echo "✅ ICS commit edildi."
            fi

            TARIH_TR=$(date +'%B %Y')
            MESAJ="📈 <b>Makro Takvim Güncellendi</b>%0A<i>$TARIH_TR</i>%0A%0AFORMC + CPI + NFP + PCE + Earnings tarihleri yenilendi.%0AGoogle Calendar otomatik senkronize olacak.%0A%0A<i>finzora ai</i>"
            curl -s -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_PRIVATE_ID}" \
              -d "text=${MESAJ}" \
              -d "parse_mode=HTML" > /dev/null
            echo "✅ Telegram bildirimi gönderildi."
          fi
