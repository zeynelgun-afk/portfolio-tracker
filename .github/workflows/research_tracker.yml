name: Adil Değer Research Tracker (v5.0)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'daily veya weekly'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - status

jobs:
  tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repo çek
        uses: actions/checkout@v4
        with:
          # PAT_TOKEN secret was created 2026-02-18 and expired around May 2026.
          # GITHUB_TOKEN with `permissions: contents: write` (set above) is
          # sufficient for both read and push to the same repo.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıklar
        run: pip install requests

      - name: Research Tracker çalıştır
        run: |
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="daily"; fi
          python3 scripts/research_tracker.py --$MODE --verbose
        env:
          FMP_API_KEY:           ${{ secrets.FMP_API_KEY }}
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_CHAT: ${{ secrets.TELEGRAM_PRIVATE_ID }}

      - name: index.json değişikliği commit et
        if: ${{ inputs.mode != 'status' }}
        run: |
          git config user.name "Finzora AI"
          git config user.email "zeynelgun@users.noreply.github.com"
          if ! git diff --quiet data/research/index.json 2>/dev/null; then
            git add data/research/index.json
            git commit -m "[TRACKER] Research takip güncellemesi ($(date +%Y-%m-%d))"
            git pull --rebase origin main || true
            git push origin main
          else
            echo "index.json değişmedi, commit atlandı"
          fi
