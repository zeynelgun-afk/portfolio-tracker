name: Finzora Agent

on:
  schedule:
    # Sabah: 13:00 UTC = 16:00 TR (piyasa öncesi)
    - cron: '0 13 * * 1-5'
    # Kapanış: 21:30 UTC = 00:30 TR
    - cron: '30 21 * * 1-5'
    # Seans içi izleme: her 30dk (14:30-21:00 UTC)
    - cron: '0,30 14-20 * * 1-5'
    # Haftalık: Pazar 09:00 UTC = 12:00 TR
    - cron: '0 9 * * 0'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Çalışma modu'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - closing
          - monitor
          - weekly
  push:
    paths:
      - 'agent/*.py'
      - '.github/workflows/agent.yml'

permissions:
  contents: write  # Yazma izni — JSON + CSV güncellemeleri için

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Event kontrol
        run: |
          echo "Event: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Push event - agent syntax gecerli, schedule devam edecek"
          else
            echo "${{ github.event_name }} - agent baslatiliyor"
          fi

  agent:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'push'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Python kurulum
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Bağımlılıklar
        run: pip install anthropic requests pytz beautifulsoup4

      - name: Git kimlik
        run: |
          git config user.name "Finzora Agent"
          git config user.email "zeynelgun@users.noreply.github.com"

      - name: Modu belirle
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            if [ "$HOUR" = "13" ] && [ "$MIN" = "00" ]; then
              echo "mode=morning" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "21" ] && [ "$MIN" = "30" ]; then
              echo "mode=closing" >> $GITHUB_OUTPUT
            elif [ "$(date -u +%u)" = "7" ]; then
              echo "mode=weekly" >> $GITHUB_OUTPUT
            else
              echo "mode=monitor" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Agent çalıştır
        id: agent_run
        run: python agent/orchestrator.py
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          FMP_API_KEY:            ${{ secrets.FMP_API_KEY }}
          TELEGRAM_TOKEN:         ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_PRIVATE_CHAT:  ${{ secrets.TELEGRAM_PRIVATE_CHAT }}
          RAPIDAPI_KEY:           ${{ secrets.RAPIDAPI_KEY }}
          AGENT_MODE:             ${{ steps.mode.outputs.mode }}
          PYTHONUNBUFFERED:       "1"

      - name: Günlük özet (sadece closing modunda)
        if: success() && steps.mode.outputs.mode == 'closing'
        run: python scripts/heartbeat.py --mode ozet
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_CHAT }}

      - name: Hata bildirimi
        if: failure()
        run: |
          python scripts/event_logger.py             --seviye kritik             --baslik "Agent çöktü — ${{ steps.mode.outputs.mode }}"             --detay "GitHub Actions workflow başarısız oldu. Commit: ${{ github.sha }} | Branch: ${{ github.ref_name }}"             --kaynak "github_actions"
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_CHAT }}

      - name: Değişiklikleri kaydet
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          ZAMAN=$(date -u '+%Y-%m-%d %H:%M UTC')
          
          # Degisen dosyalari gecici yere yedekle
          mkdir -p /tmp/agent_backup/data/portfolios /tmp/agent_backup/data/swing /tmp/agent_backup/agent/memory
          cp data/portfolios/*.json          /tmp/agent_backup/data/portfolios/ 2>/dev/null || true
          cp data/swing/active.json          /tmp/agent_backup/data/swing/      2>/dev/null || true
          cp data/swing/closed.json          /tmp/agent_backup/data/swing/      2>/dev/null || true
          cp data/swing/status.json          /tmp/agent_backup/data/swing/      2>/dev/null || true
          cp data/transactions.csv           /tmp/agent_backup/data/             2>/dev/null || true
          cp data/watchlist.json             /tmp/agent_backup/data/             2>/dev/null || true
          cp data/summary.json               /tmp/agent_backup/data/             2>/dev/null || true
          cp data/buy_candidates.json        /tmp/agent_backup/data/             2>/dev/null || true
          cp data/macro_intelligence.json    /tmp/agent_backup/data/             2>/dev/null || true
          cp agent/memory/*.json             /tmp/agent_backup/agent/memory/     2>/dev/null || true
          
          # Temiz git state
          git fetch origin main
          git rebase --abort 2>/dev/null || true
          git merge --abort  2>/dev/null || true
          git reset --hard origin/main
          
          # Yedekleri geri yukle
          cp /tmp/agent_backup/data/portfolios/*.json data/portfolios/ 2>/dev/null || true
          cp /tmp/agent_backup/data/swing/*.json      data/swing/      2>/dev/null || true
          cp /tmp/agent_backup/data/*.json            data/            2>/dev/null || true
          cp /tmp/agent_backup/data/*.csv             data/            2>/dev/null || true
          cp /tmp/agent_backup/agent/memory/*.json    agent/memory/    2>/dev/null || true
          
          git add \
            data/portfolios/*.json \
            data/swing/active.json \
            data/buy_candidates.json \
            data/macro_intelligence.json \
            data/swing/closed.json \
            data/swing/status.json \
            data/transactions.csv \
            data/watchlist.json \
            data/summary.json \
            agent/memory/*.json \
            data/premarket_gaps.json \
            data/swing_entry_signals.json \
            data/alpha_scan_*.json \
            reports/ 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "Değişiklik yok — commit atlanıyor"
          else
            git commit -m "[Agent/$MODE] Otomatik güncelleme — $ZAMAN"
            git push origin main && echo "✅ Repo güncellendi" || (sleep 15 && git fetch origin main && git reset --hard origin/main && cp /tmp/agent_backup/data/portfolios/*.json data/portfolios/ 2>/dev/null && cp /tmp/agent_backup/data/*.json data/ 2>/dev/null && cp /tmp/agent_backup/data/*.csv data/ 2>/dev/null && git add -A && git commit -m "[Agent/$MODE] Retry — $ZAMAN" && git push origin main)
          fi
