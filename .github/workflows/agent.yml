name: Finzora Agent v2

# Triggered by:
#   1) scripts/telegram_bot.py thread scheduler (Railway) via workflow_dispatch
#   2) Manual run in GitHub UI (Actions tab)
#   3) Push of agent/** code (validation run only, no agent execution)
#
# Modes:
#   morning  — daily pre-session report (agent/reports/morning.py)
#   monitor  — position alerts every 30 min (agent/monitor.py)
#   closing  — daily post-close report (PLACEHOLDER, not yet implemented)
#   weekly   — Sunday weekly summary (PLACEHOLDER, not yet implemented)
#
# Replaces the 216-line legacy agent.yml that called agent/legacy/orchestrator.py.
# Old file kept as agent.yml.legacy for reference.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode'
        required: false
        default: 'monitor'
        type: choice
        options:
          - morning
          - monitor
          - closing
          - weekly
  push:
    paths:
      - 'agent/**/*.py'
      - '.github/workflows/agent.yml'

permissions:
  contents: write

# Manual morning + scheduled monitor at the same time would race on
# data/portfolio.json. Drop the older one rather than queue.
concurrency:
  group: finzora-agent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  agent:
    runs-on: ubuntu-latest
    # Push events run only the validate step; they don't dispatch the agent.
    if: github.event_name != 'push'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Git identity
        run: |
          git config user.name "Finzora Bot"
          git config user.email "finzora-bot@users.noreply.github.com"

      - name: Determine mode
        id: mode
        run: |
          INPUT_MODE="${{ github.event.inputs.mode }}"
          HOUR=$(TZ=Europe/Istanbul date +%H)
          WDAY=$(date +%u)

          if [ -n "$INPUT_MODE" ]; then
            MODE="$INPUT_MODE"
          else
            # Time-based fallback if dispatched without input
            if [ "$WDAY" -eq 7 ] && [ "$HOUR" -ge 12 ] && [ "$HOUR" -le 13 ]; then
              MODE="weekly"
            elif [ "$HOUR" -eq 16 ]; then
              MODE="morning"
            elif [ "$HOUR" -eq 0 ] || [ "$HOUR" -eq 1 ]; then
              MODE="closing"
            else
              MODE="monitor"
            fi
          fi

          echo "Selected mode: $MODE (TR hour=$HOUR, weekday=$WDAY)"
          echo "mode=$MODE" >> $GITHUB_OUTPUT

      - name: Run agent
        env:
          FMP_API_KEY:            ${{ secrets.FMP_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_CHAT_ID: '-1003827034395'
          TELEGRAM_DM_CHAT_ID:    '1403072107'
          PYTHONUNBUFFERED:       '1'
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          case "$MODE" in
            morning)
              python -m agent.reports.morning --send
              ;;
            monitor)
              python -m agent.monitor
              ;;
            closing)
              python -m agent.reports.closing --send
              ;;
            weekly)
              echo "[agent v2] weekly report not yet implemented — placeholder run"
              # Future: python -m agent.reports.weekly --send
              ;;
            *)
              echo "Unknown mode: $MODE"
              exit 1
              ;;
          esac

      - name: Commit changes
        if: success()
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')

          git fetch origin main
          git pull --rebase origin main || git rebase --abort

          # Only data/portfolio.json and report files should change.
          # monitor_state.json is gitignored.
          git add data/portfolio.json reports/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[bot/agent-$MODE] Auto update — $TIME"
            git push origin main || (
              # Retry once on push race
              sleep 5
              git fetch origin main
              git pull --rebase origin main
              git push origin main
            )
          fi

      - name: Error notification (Zeynel DM)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_DM_CHAT_ID: '1403072107'
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from agent.telegram import send_to_dm
          mode = '${{ steps.mode.outputs.mode }}'
          sha = '${{ github.sha }}'[:8]
          run_id = '${{ github.run_id }}'
          repo = '${{ github.repository }}'
          send_to_dm(
              f'❌ <b>Agent workflow başarısız</b>\n'
              f'Mod: {mode}\n'
              f'Commit: {sha}\n'
              f'Log: https://github.com/{repo}/actions/runs/{run_id}'
          )
          " || true
