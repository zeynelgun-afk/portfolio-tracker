name: Finzora Agent

on:
  schedule:
    # Sabah: 13:00 UTC ana tetik + 13:12 yedek. GitHub Actions ':00' dakikasini
    # yogun repolarda bazen atliyor. Yedek tetikte orchestrator duplicate-guard
    # ile (bugunku SABAH raporu varsa skip) tekrar calismaz — boylece ana tetik
    # kacirilirsa yedek devreye girer, kacirilmazsa yedek no-op.
    - cron: '0 13 * * 1-5'
    - cron: '12 13 * * 1-5'
    # Kapanis: 21:30 UTC ana + 21:42 yedek. run_closing icinde
    # DAILY_KAPANIS_YYYY-MM-DD.md varligina gore guard aktif.
    - cron: '30 21 * * 1-5'
    - cron: '42 21 * * 1-5'
    # Monitor (seans ici, her yarim saat) — guard yok ama monitor idempotent:
    # pozisyon kontrolu + fiyat yenileme, ayri dosya yazmaz.
    - cron: '0,30 14-20 * * 1-5'
    # Haftalik (Pazar) ana + yedek. run_weekly icinde WEEKLY_YYYY_MM_DD.md
    # guard'i aktif.
    - cron: '0 9 * * 0'
    - cron: '12 9 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Calisma modu'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - closing
          - monitor
          - weekly
  push:
    paths:
      - 'agent/*.py'
      - '.github/workflows/agent.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Event kontrol
        run: echo "Event=${{ github.event_name }} — schedule aktif"

  agent:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'push'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: ChromaDB cache
        uses: actions/cache@v4
        with:
          path: data/rag/chroma
          # events.jsonl her run değişiyordu → cache hiç hit etmiyordu.
          # Haftalık stable key + docs hash (dersler docs'a eklendiğinde refresh).
          key: chroma-v2-${{ hashFiles('docs/*.md','data/swing/closed.json') }}-wk${{ github.run_number }}
          restore-keys: |
            chroma-v2-${{ hashFiles('docs/*.md','data/swing/closed.json') }}-
            chroma-v2-
            chroma-

      - name: Bagimliliklar
        run: pip install anthropic requests pytz beautifulsoup4 voyageai chromadb

      - name: Git kimlik
        run: |
          git config user.name "Finzora Agent"
          git config user.email "zeynelgun@users.noreply.github.com"

      - name: Modu belirle
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Europe/Istanbul date +%H)
            MIN=$(TZ=Europe/Istanbul date +%M)
            WDAY=$(date +%u)
            if [ "$WDAY" -eq 7 ]; then
              echo "mode=weekly" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -eq 16 ] || ([ "$HOUR" -eq 15 ] && [ "$MIN" -ge 45 ]); then
              echo "mode=morning" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -eq 0 ] || [ "$HOUR" -eq 1 ]; then
              echo "mode=closing" >> $GITHUB_OUTPUT
            else
              echo "mode=monitor" >> $GITHUB_OUTPUT
            fi
          fi

      - name: RAG index guncelle
        run: |
          python scripts/rag/indexer.py 2>&1 | tail -20 || echo "RAG index atlandi (toleransli hata)"
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        continue-on-error: true

      - name: Agent calistir
        run: python agent/orchestrator.py
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          FMP_API_KEY:           ${{ secrets.FMP_API_KEY }}
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RAPIDAPI_KEY:          ${{ secrets.RAPIDAPI_KEY }}
          VOYAGE_API_KEY:        ${{ secrets.VOYAGE_API_KEY }}
          AGENT_MODE:            ${{ steps.mode.outputs.mode }}
          PYTHONUNBUFFERED:      '1'

      - name: Macro intelligence Telegram DM (sabah)
        if: success() && steps.mode.outputs.mode == 'morning'
        run: python3 scripts/macro_intelligence_notify.py
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      - name: Kapanis ozeti
        if: success() && steps.mode.outputs.mode == 'closing'
        run: python scripts/heartbeat.py --mode ozet
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Hata bildirimi
        if: failure()
        run: |
          pip install requests -q
          python scripts/event_logger.py \
            --seviye kritik \
            --baslik "Agent coktu" \
            --detay "Commit: ${{ github.sha }}" \
            --kaynak "github_actions" || true
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Degisiklikleri kaydet
        run: |
          mkdir -p /tmp/ab/data/portfolios /tmp/ab/data/swing /tmp/ab/agent/memory /tmp/ab/logs
          cp data/portfolios/*.json /tmp/ab/data/portfolios/ 2>/dev/null || true
          cp data/swing/*.json      /tmp/ab/data/swing/      2>/dev/null || true
          cp data/*.json            /tmp/ab/data/            2>/dev/null || true
          cp data/*.csv             /tmp/ab/data/            2>/dev/null || true
          cp agent/memory/*.json    /tmp/ab/agent/memory/    2>/dev/null || true
          cp logs/events.jsonl      /tmp/ab/logs/            2>/dev/null || true
          cp logs/valuation_predictions.jsonl /tmp/ab/logs/  2>/dev/null || true
          git fetch origin main
          git rebase --abort 2>/dev/null || true
          git reset --hard origin/main
          cp /tmp/ab/data/portfolios/*.json data/portfolios/ 2>/dev/null || true
          cp /tmp/ab/data/swing/*.json      data/swing/      2>/dev/null || true
          cp /tmp/ab/data/*.json            data/            2>/dev/null || true
          cp /tmp/ab/data/*.csv             data/            2>/dev/null || true
          cp /tmp/ab/agent/memory/*.json    agent/memory/    2>/dev/null || true
          # Observability JSONL merge (id bazlı dedup) — ayrı script, YAML temiz kalsın
          if [ -f /tmp/ab/logs/events.jsonl ] && [ -f logs/events.jsonl ]; then
            python3 scripts/_merge_events_jsonl.py logs/events.jsonl /tmp/ab/logs/events.jsonl > logs/events.jsonl.new
            mv logs/events.jsonl.new logs/events.jsonl
          elif [ -f /tmp/ab/logs/events.jsonl ]; then
            cp /tmp/ab/logs/events.jsonl logs/events.jsonl
          fi
          # Valuation predictions: append-only, timestamp bazlı dedup
          if [ -f /tmp/ab/logs/valuation_predictions.jsonl ] && [ -f logs/valuation_predictions.jsonl ]; then
            cat logs/valuation_predictions.jsonl /tmp/ab/logs/valuation_predictions.jsonl | sort -u > logs/valuation_predictions.jsonl.new
            mv logs/valuation_predictions.jsonl.new logs/valuation_predictions.jsonl
          elif [ -f /tmp/ab/logs/valuation_predictions.jsonl ]; then
            cp /tmp/ab/logs/valuation_predictions.jsonl logs/valuation_predictions.jsonl
          fi
          MODE="${{ steps.mode.outputs.mode }}"
          ZAMAN=$(date -u '+%Y-%m-%d %H:%M UTC')
          git add data/ agent/memory/ reports/ logs/events.jsonl logs/valuation_predictions.jsonl 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Degisiklik yok"
          else
            git commit -m "[Agent/$MODE] Otomatik guncelleme — $ZAMAN"
            git push origin main || (sleep 10 && git fetch origin main && git reset --hard origin/main && cp /tmp/ab/data/portfolios/*.json data/portfolios/ 2>/dev/null && cp /tmp/ab/data/*.json data/ 2>/dev/null && cp /tmp/ab/data/*.csv data/ 2>/dev/null && cp /tmp/ab/logs/events.jsonl logs/ 2>/dev/null && cp /tmp/ab/logs/valuation_predictions.jsonl logs/ 2>/dev/null && git add -A && git commit -m "[Agent/$MODE] Retry — $ZAMAN" && git push origin main)
          fi
