name: Thematic Discovery
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Discovery mode'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
      dry_run:
        description: 'Dry run (no save, no DM)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

concurrency:
  group: finzora-thematic-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run thematic discovery
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_CHAT_ID: '-1003827034395'
          TELEGRAM_DM_CHAT_ID: '1403072107'
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          if [ "$DRY" = "true" ]; then
            python scripts/thematic_discovery.py --mode "$MODE" --dry-run
          else
            python scripts/thematic_discovery.py --mode "$MODE" --dm
          fi

      - name: Commit thematic + watchlist changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/themes.json data/watchlist.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[thematic] ${{ github.event.inputs.mode || 'daily' }} discovery"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "Push retry $i..."
              sleep 2
            done
          fi
