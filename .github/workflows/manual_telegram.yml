name: Manual Telegram Notify

on:
  workflow_dispatch:
    inputs:
      message_b64:
        description: 'Mesaj (base64 encoded)'
        required: true
        type: string
      target:
        description: 'Hedef: group veya dm'
        required: false
        default: 'group'
        type: choice
        options:
          - group
          - dm

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
          MSG_B64: ${{ inputs.message_b64 }}
          TARGET: ${{ inputs.target }}
        run: |
          python3 - <<'PYEOF'
          import os, base64, requests
          token = os.environ['TELEGRAM_BOT_TOKEN']
          target = os.environ.get('TARGET', 'group')
          chat_id = os.environ['TELEGRAM_PRIVATE_ID'] if target == 'dm' else os.environ['TELEGRAM_CHAT_ID']
          msg = base64.b64decode(os.environ['MSG_B64']).decode('utf-8')
          url = f"https://api.telegram.org/bot{token}/sendMessage"
          r = requests.post(url, data={'chat_id': chat_id, 'text': msg, 'parse_mode': 'HTML', 'disable_web_page_preview': 'true'}, timeout=30)
          print(f"Status: {r.status_code}")
          print(r.text[:500])
          r.raise_for_status()
          PYEOF
