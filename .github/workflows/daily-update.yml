name: 📊 Günlük Portföy Güncellemesi

on:
  # Her hafta içi 19:00 UTC (22:00 Türkiye saati)
  schedule:
    - cron: '0 19 * * 1-5'
  
  # Manuel tetikleme için
  workflow_dispatch:

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Repository Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Bağımlılıkları Yükle
        run: |
          pip install requests --break-system-packages
      
      - name: 📊 Portföyleri Güncelle
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          # API key'i script'e aktar
          sed -i 's/FMP_API_KEY = ".*"/FMP_API_KEY = "'$FMP_API_KEY'"/' scripts/update_all_portfolios.py
          
          # Script'i çalıştır
          python3 scripts/update_all_portfolios.py
          
          echo "✅ Güncelleme tamamlandı"
      
      - name: 📝 Değişiklikleri Commit Et
        run: |
          # Git yapılandırması
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Remote değişiklikleri al (varsa)
          git pull --rebase origin main || true
          
          # Değişiklikleri ekle
          git add data/portfolios/*.json || true
          git add data/swing/*.json || true
          git add data/*.json || true
          
          # Commit (değişiklik varsa)
          if ! git diff --quiet --cached; then
            git commit -m "🤖 Otomatik güncelleme: $(date +'%Y-%m-%d %H:%M') UTC"
            echo "✅ Commit oluşturuldu"
          else
            echo "ℹ️  Değişiklik yok, commit atlandı"
          fi
      
      - name: 🚀 GitHub'a Push
        run: |
          # Push et (değişiklik varsa)
          if git log origin/main..HEAD --oneline | grep -q .; then
            git push origin main
            echo "✅ Push başarılı"
          else
            echo "ℹ️  Push edilecek değişiklik yok"
          fi

